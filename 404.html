<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - Lawn Craft">
    <title>404 - Page Not Found | Lawn Craft</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <!-- Fallbacks / additional meta for broader browser compatibility -->
    <meta name="msapplication-TileColor" content="#4CAF50">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <header id="main-header">
        <div class="header-container">
            <a href="/" class="logo-link">
                <img src="/assets/images/lawn-craft.png" alt="Lawn Craft Logo" class="logo-image">
                <span class="logo-text">Lawn Craft</span>
            </a>
            <nav class="nav-menu">
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/services">Services</a></li>
                    <li><a href="/insights">Insights</a></li>
                    <li><a href="/contact">Contact Us</a></li>
                </ul>
            </nav>
            <button class="menu-toggle directory-toggle" type="button" aria-expanded="false" aria-controls="directory-panel" aria-label="Open menu">
                <span>Menu</span>
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="main-content" id="main-content" style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem;">
        <div>
            <h1 style="font-size:6rem;color:var(--primary);margin:0;line-height:1;">404</h1>
            <h2 style="margin:0.5rem 0 1rem;">Page Not Found</h2>
            <p style="color:var(--text-light);max-width:400px;margin:0 auto 2rem;">The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn btn-primary">Go Home</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; <span id="currentYear"></span> Lawn Craft. All rights reserved.</p>
    </footer>
    <script>document.getElementById('currentYear').textContent=new Date().getFullYear()</script>
    <script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>
</html>
